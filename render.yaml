services:
  - type: web
    name: smart-career-assistant
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend/app/main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MOCK_MODE
        value: "true"
        sync: false
    staticPublishPath: frontend
    routes:
      - type: rewrite
        source: /
        destination: /index.html
